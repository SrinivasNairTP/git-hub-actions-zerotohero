name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ variables.DOCKERHUB_USER }}
          password: ${{ variables.DOCKERHUB_TOKEN }}

      - name: Build and Push to DockerHub
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ variables.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
            ${{ variables.DOCKERHUB_USER }}/github-actions-app:${{ github.sha }}