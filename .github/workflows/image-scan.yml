name: Image scanner

on:
 workflow_call
jobs:
    image-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Login into Docker Hub
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Run Trivvy Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          severity: 'CRITICAL'
          exit-code: 1