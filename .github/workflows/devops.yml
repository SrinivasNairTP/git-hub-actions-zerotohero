---
name: Devops
on: 
 push: 
  branches:
    - main
jobs:
  Code:
   runs-on: ubuntu-latest
   steps:
     - name: GitCheckout
       run: echo "Checkout"
  Build:
   runs-on: ubuntu-latest
   needs: Code
   steps:
     - name: Build
       run: echo "Build using Docker"
  Test:
   runs-on: ubuntu-latest
