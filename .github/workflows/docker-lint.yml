name: Docker lint

on: 
  workflow_call:

jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -l
          ls -R
          test -f Dockerfile && echo "Dockerfile found"

      - name: Validate Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile