name: dependancy scan

on:
 workflow_call

jobs:
   dependency-check:
       runs-on: ubuntu-latest
       steps:
           - name: Code checkout
             uses: action/checkout@v4

           - name: Setup Python
             uses: actions/setup-python@3.12
             with:
                python-version:"3.12"
      
           - name: Install pip  audit
             run: pip install pip-audit
             
      
           - name: Audit dependencies
             run: pip-audit -r requirements.txt