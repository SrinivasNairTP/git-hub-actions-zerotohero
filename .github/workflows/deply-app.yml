name: Deploy Flask app

on:
  workflow_dispatch:
  push:
    branches:
    - main
jobs:
  deploy:
    runs-on: self-hosted

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Deploy with docker compose
        run: docker compose up -d --build